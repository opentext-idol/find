<div
        class="main-results-container answered-question m-b-sm"
        data-cid="<%-model.cid %>"
        data-toggle="tooltip"
        title="<%- i18n['search.answeredQuestion.systemName'](model.get('systemName')) %>"
>
    <div class="default-result-container">
        <span class="pull-left m-t-xs text-muted m-r-sm fa-stack">
            <i class="fa fa-comments-o fa-stack-2x"></i>
            <i class="fa fa-question fa-stack-1x"></i>
        </span>
        <div class="results-contents">
            <span class="pull-right m-t-xs text-muted promoted-label">
                <span class="fa-stack">
                    <i class="fa fa-comments-o fa-stack-2x"></i>
                    <i class="fa fa-question fa-stack-1x"></i>
                </span>
                <%- i18n['search.answeredQuestion'] %>
            </span>
            <h4 class="m-b-nil m-t-sm result-header">
                <% if (isLink(model.get('source'))) {  %>
                <a title="<%-model.get('source')%>" href="<%-model.get('source')%>" target="_blank"><%- i18n['search.answeredQuestion.question'] %><%- model.get('question') %></a>
                <% } else { %>
                <span title="<%-model.get('source') || ''%>"><%- i18n['search.answeredQuestion.question'] %><%- model.get('question') %></span>
                <% } %>
            </h4>
            <div class="summary-text m-t-xs m-b-xs">
                <span class="extended-answer"><%= extendedAnswer %></span>
            </div>
        </div>
    </div>
</div>
